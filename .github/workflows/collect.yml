name: Collect Best Buy Data

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC → 01/07/13/19 Europe/Zurich (CET) or 02/08/14/20 (CEST)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Optional: cap number of pages (testing). Leave empty for full catalog."
        required: false
        type: string

concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: read
  issues: write   # for future failure-reporting step

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: |
          if [ -n "${{ inputs.max_pages }}" ]; then
            python -m bbpipeline.run --max-pages "${{ inputs.max_pages }}"
          else
            python -m bbpipeline.run
          fi
